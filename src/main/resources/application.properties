# ─── Database ───────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/careerconnect_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Thymeleaf ──────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ─── File Upload ────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.root=uploads

# ─── Mail ───────────────────────────────────────────────────
# To send real emails: replace username/password with your Gmail + App Password
# (Google Account → Security → 2FA → App Passwords)
# If not configured, emails are logged to console only (safe default).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@careerconnect.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false

# ─── Server ─────────────────────────────────────────────────
server.port=8080
spring.application.name=CareerConnect

# Increase Tomcat response buffer to prevent early response commit
# (avoids "Cannot create session after response committed" with large templates)
server.tomcat.connection-timeout=20000ms
