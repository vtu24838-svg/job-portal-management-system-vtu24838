<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employer Profile — CareerConnect</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="page-wrapper">

<div th:replace="~{fragments/layout :: dashNavbar}"></div>

<div class="dashboard-layout no-right">

  <div th:replace="~{fragments/layout :: employerSidebar(user=${user}, activePage='profile')}"></div>

  <main>
    <div class="card mb-3">
      <h1 style="font-size:18px; font-weight:700;">Employer Profile</h1>
      <p class="text-muted mt-1">Manage your company information and personal details.</p>
    </div>

    <div th:if="${successMsg}" class="alert alert-success">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      <span th:text="${successMsg}"></span>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg>
      <span th:text="${errorMsg}"></span>
    </div>

    <form th:action="@{/employer/profile}" method="post" enctype="multipart/form-data">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <!-- Profile Picture -->
      <div class="card mb-3">
        <div class="card-title">Profile Picture</div>
        <div style="display:flex; align-items:center; gap:20px;">
          <div class="avatar-circle avatar-lg" style="flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden; background: #e2e8f0;">
            <img id="profilePreview" th:if="${user.profilePicture != null}" th:src="@{'/uploads/profiles/' + ${user.profilePicture}}" style="width:100%; height:100%; object-fit:cover;"/>
            <img id="profilePreview" th:if="${user.profilePicture == null}" src="" style="width:100%; height:100%; object-fit:cover; display:none;"/>
            <span id="initialPlaceholder" th:if="${user.profilePicture == null}" style="font-size:32px; font-weight:700; color:var(--primary);" th:text="${user.name.substring(0,1).toUpperCase()}">E</span>
          </div>
          <div style="flex:1;">
            <label class="form-label">Upload Company Logo / Photo</label>
            <input type="file" name="profilePic" id="profilePicInput" class="form-control" accept="image/*"/>
            <div class="form-hint">JPG, PNG or GIF. Recommended size: 400x400px.</div>
          </div>
        </div>
      </div>

      <script>
        document.getElementById('profilePicInput').onchange = function (evt) {
          const [file] = this.files;
          if (file) {
            const preview = document.getElementById('profilePreview');
            const initial = document.getElementById('initialPlaceholder');
            if (preview) {
              preview.src = URL.createObjectURL(file);
              preview.style.display = 'block';
            }
            if (initial) initial.style.display = 'none';
          }
        }
      </script>

      <!-- Basic Info -->
      <div class="card mb-3">
        <div class="card-title">Basic Information</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" th:value="${user.name}" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" name="phone" class="form-control" th:value="${user.phone}" placeholder="+91 9876543210"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" th:value="${user.email}" disabled style="background:var(--bg); cursor:not-allowed;"/>
          <div class="form-hint">Email address cannot be changed.</div>
        </div>
      </div>

      <!-- Company Info -->
      <div class="card mb-3">
        <div class="card-title">Company Information</div>
        <div class="form-group">
          <label class="form-label">Company Name</label>
          <input type="text" name="company" class="form-control" th:value="${user.company}" placeholder="Enter your company name" required/>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
    </form>
  </main>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
