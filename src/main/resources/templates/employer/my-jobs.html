<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Jobs — CareerConnect</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="page-wrapper">

<div th:replace="~{fragments/layout :: dashNavbar}"></div>

<div class="dashboard-layout no-right">

  <div th:replace="~{fragments/layout :: employerSidebar(user=${user}, activePage='myjobs')}"></div>

  <main>
    <div class="card mb-3">
      <div class="flex-between">
        <div>
          <h1 style="font-size:18px; font-weight:700;">My Job Listings</h1>
          <p class="text-muted mt-1">Manage your active and closed job postings.</p>
        </div>
        <a th:href="@{/employer/post-job}" class="btn btn-primary">
          <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Post New Job
        </a>
      </div>
    </div>

    <div th:if="${successMsg}" class="alert alert-success"><span th:text="${successMsg}"></span></div>

    <div th:if="${jobs.empty}" class="card">
      <div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </div>
        <div class="empty-title">No jobs posted</div>
        <div class="empty-desc">Create your first job listing to start receiving applications.</div>
        <a th:href="@{/employer/post-job}" class="btn btn-primary">Post a Job</a>
      </div>
    </div>

    <div th:if="${!jobs.empty}" class="card">
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Job Title</th>
              <th>Location</th>
              <th>Type</th>
              <th>Status</th>
              <th>Posted</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="job : ${jobs}">
              <td>
                <div style="font-weight:600; font-size:14px;" th:text="${job.title}">Title</div>
                <div style="font-size:12px; color:var(--text-secondary);" th:text="${job.salary}">Salary</div>
              </td>
              <td th:text="${job.location}">Location</td>
              <td>
                <span class="badge badge-secondary" th:text="${job.type}">Type</span>
              </td>
              <td>
                <span class="badge"
                      th:classappend="${job.status.name() == 'OPEN' ? 'badge-success' : 'badge-secondary'}"
                      th:text="${job.status}">Status</span>
              </td>
              <td>
                <span style="font-size:12px;" th:text="${job.createdAt != null ? #temporals.format(job.createdAt, 'dd MMM yyyy') : '-'}">Date</span>
              </td>
              <td>
                <div style="display:flex; gap:6px; flex-wrap:wrap;">
                  <a th:href="@{/employer/applicants/{id}(id=${job.id})}" class="btn btn-outline btn-sm">Applicants</a>
                  <a th:href="@{/employer/edit-job/{id}(id=${job.id})}" class="btn btn-ghost btn-sm">Edit</a>
                  <form th:action="@{/employer/toggle-job/{id}(id=${job.id})}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-warning btn-sm"
                            th:text="${job.status.name() == 'OPEN' ? 'Close' : 'Reopen'}">Toggle</button>
                  </form>
                  <form th:action="@{/employer/delete-job/{id}(id=${job.id})}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger btn-sm"
                            data-confirm="Are you sure you want to delete this job?">Delete</button>
                  </form>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
