<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Applicants — CareerConnect</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="page-wrapper">

<div th:replace="~{fragments/layout :: dashNavbar}"></div>

<div class="dashboard-layout no-right">

  <div th:replace="~{fragments/layout :: employerSidebar(user=${user}, activePage='myjobs')}"></div>

  <main>
    <!-- Back nav -->
    <div style="margin-bottom:16px;">
      <a th:href="@{/employer/my-jobs}" style="font-size:13px; color:var(--text-secondary); display:inline-flex; align-items:center; gap:4px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back to My Jobs
      </a>
    </div>

    <div class="card mb-3">
      <h1 style="font-size:18px; font-weight:700;">Applicants for: <span style="color:var(--primary);" th:text="${job.title}">Job Title</span></h1>
      <p class="text-muted mt-1" th:text="${applications.size()} + ' application(s) received'">Count</p>
    </div>

    <div th:if="${successMsg}" class="alert alert-success"><span th:text="${successMsg}"></span></div>

    <div th:if="${applications.empty}" class="card">
      <div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        </div>
        <div class="empty-title">No applicants yet</div>
        <div class="empty-desc">Share your job listing to attract more candidates.</div>
      </div>
    </div>

    <div th:if="${!applications.empty}" style="display:flex; flex-direction:column; gap:14px;">
      <div th:each="app : ${applications}" class="card" style="padding:20px;">
        <div class="flex-between" style="flex-wrap:wrap; gap:12px;">
          <div style="display:flex; gap:14px; align-items:center;">
            <!-- Avatar — gold ring for premium applicants -->
            <div style="position:relative; flex-shrink:0;">
              <div th:if="${app.applicant.profilePicture != null}"
                   th:classappend="${app.applicant.premium ? ' premium-avatar-ring-sm' : ''}"
                   style="width:52px; height:52px; border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                <img th:src="@{'/uploads/profiles/' + ${app.applicant.profilePicture}}"
                     style="width:100%; height:100%; object-fit:cover;" alt="Avatar"/>
              </div>
              <div th:if="${app.applicant.profilePicture == null}"
                   th:classappend="${app.applicant.premium ? ' premium-avatar-ring-sm' : ''}"
                   style="width:52px; height:52px; background:var(--primary-light); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:20px; color:var(--primary);"
                   th:text="${app.applicant.name.substring(0,1).toUpperCase()}">A</div>
              <!-- Gold crown for premium -->
              <div th:if="${app.applicant.premium}"
                   style="position:absolute; top:-6px; right:-6px; background:linear-gradient(135deg,#FFD700,#FFA500); border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center; font-size:10px; box-shadow:0 2px 6px rgba(255,165,0,0.5);">⭐</div>
            </div>
            <div>
              <div style="display:flex; align-items:center; gap:8px;">
                <span style="font-weight:700; font-size:15px;" th:text="${app.applicant.name}">Name</span>
                <span th:if="${app.applicant.premium}"
                      style="display:inline-flex; align-items:center; gap:3px; background:linear-gradient(90deg,#FFD700,#FFA500); color:#1a1a1a; font-size:10px; font-weight:800; padding:2px 8px; border-radius:999px; letter-spacing:0.04em;">⭐ PREMIUM</span>
              </div>
              <div style="font-size:13px; color:var(--text-secondary);" th:text="${app.applicant.email}">Email</div>
              <div style="font-size:12px; color:var(--text-muted); margin-top:2px;"
                   th:if="${app.applicant.phone != null}"
                   th:text="'📞 ' + ${app.applicant.phone}">Phone</div>
            </div>
          </div>
          <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <span class="badge"
                  th:classappend="${app.status.name() == 'SHORTLISTED' ? 'badge-success' :
                                   (app.status.name() == 'REJECTED'    ? 'badge-danger' :
                                    'badge-primary')}"
                  th:text="${app.status}">Status</span>
            <span style="font-size:11px; color:var(--text-muted);"
                  th:text="${app.appliedAt != null ? 'Applied ' + #temporals.format(app.appliedAt, 'dd MMM yyyy') : ''}">Date</span>
          </div>
        </div>

        <!-- Skills -->
        <div th:if="${app.applicant.skills != null and !app.applicant.skills.isEmpty()}"
             style="margin-top:12px; padding-top:12px; border-top:1px solid var(--border);">
          <div style="font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px;">Skills</div>
          <div th:text="${app.applicant.skills}" style="font-size:13px; color:var(--text-primary);"></div>
        </div>

        <!-- Cover Letter -->
        <div th:if="${app.coverLetter != null and !app.coverLetter.isEmpty()}"
             style="margin-top:12px; padding-top:12px; border-top:1px solid var(--border);">
          <div style="font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px;">Cover Letter</div>
          <div th:text="${app.coverLetter}" style="font-size:13px; color:var(--text-secondary); line-height:1.7;"></div>
        </div>

        <!-- Actions -->
        <div style="display:flex; gap:8px; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); flex-wrap:wrap; align-items:center;">
          <div th:if="${app.applicant.resumePath != null and !app.applicant.resumePath.isEmpty()}">
            <a th:href="@{/uploads/{f}(f=${app.applicant.resumePath})}" target="_blank" class="btn btn-outline btn-sm">
              <svg viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              View Resume
            </a>
          </div>
          <form th:action="@{/employer/application/{id}/status(id=${app.id})}" method="post" style="display:flex; gap:6px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="jobId" th:value="${job.id}"/>
            <button type="submit" name="status" value="SHORTLISTED" class="btn btn-success btn-sm">
              ✓ Shortlist
            </button>
            <button type="submit" name="status" value="REJECTED" class="btn btn-danger btn-sm">
              ✗ Reject
            </button>
            <button type="submit" name="status" value="PENDING" class="btn btn-ghost btn-sm">
              Reset
            </button>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
