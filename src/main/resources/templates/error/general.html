<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error — CareerConnect</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); flex-direction:column; text-align:center; padding:40px;">
  <div style="width:72px; height:72px; background:var(--danger-light); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  </div>
  <h1 style="font-size:24px; font-weight:700; margin-bottom:8px; color:var(--text-primary);">Something went wrong</h1>
  <p style="color:var(--text-secondary); margin-bottom:24px;" th:text="${errorMessage}">An unexpected error occurred.</p>
  <a href="/" class="btn btn-primary">Go to Homepage</a>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
