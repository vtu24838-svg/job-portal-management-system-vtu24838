<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Access Denied — CareerConnect</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); flex-direction:column; text-align:center; padding:40px;">
  <div style="width:72px; height:72px; background:var(--warning-light); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
  <div style="font-size:64px; font-weight:800; color:var(--primary); line-height:1;">403</div>
  <h1 style="font-size:22px; font-weight:700; margin:12px 0 8px; color:var(--text-primary);">Access Denied</h1>
  <p style="color:var(--text-secondary); margin-bottom:24px;">You don't have permission to access this page.</p>
  <a href="/" class="btn btn-primary">Go to Homepage</a>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
