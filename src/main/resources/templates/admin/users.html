<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Users — CareerConnect</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="page-wrapper">

<div th:replace="~{fragments/layout :: dashNavbar}"></div>

<div class="dashboard-layout no-right">

  <div th:replace="~{fragments/layout :: adminSidebar(user=${user}, activePage='users')}"></div>

  <main>
    <div class="card mb-3">
      <h1 style="font-size:18px; font-weight:700;">User Management</h1>
      <p class="text-muted mt-1" th:text="${users.size()} + ' registered users'">Count</p>
    </div>

    <div th:if="${successMsg}" class="alert alert-success"><span th:text="${successMsg}"></span></div>
    <div th:if="${errorMsg}" class="alert alert-danger"><span th:text="${errorMsg}"></span></div>

    <div class="card">
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Role</th>
              <th>Company / Skills</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="u : ${users}">
              <td>
                <div style="display:flex; align-items:center; gap:10px;">
                  <div style="width:34px; height:34px; background:var(--primary-light); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:var(--primary); flex-shrink:0;"
                       th:text="${u.name.substring(0,1).toUpperCase()}">A</div>
                  <span style="font-weight:600; font-size:14px;" th:text="${u.name}">Name</span>
                </div>
              </td>
              <td style="font-size:13px;" th:text="${u.email}">Email</td>
              <td>
                <span class="badge"
                      th:classappend="${u.role.name() == 'ADMIN' ? 'badge-danger' : (u.role.name() == 'EMPLOYER' ? 'badge-warning' : 'badge-primary')}"
                      th:text="${u.role}">ROLE</span>
              </td>
              <td style="font-size:12px; color:var(--text-secondary); max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
                  th:text="${u.company != null ? u.company : (u.skills != null ? u.skills : '—')}">Info</td>
              <td style="font-size:12px;"
                  th:text="${u.createdAt != null ? #temporals.format(u.createdAt, 'dd MMM yyyy') : '—'}">Date</td>
              <td>
                <form th:action="@{/admin/users/delete/{id}(id=${u.id})}" method="post" style="display:inline;">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-danger btn-sm"
                          data-confirm="Are you sure you want to delete this user and all their data?">Delete</button>
                </form>
              </td>
            </tr>
            <tr th:if="${users.empty}">
              <td colspan="6" style="text-align:center; color:var(--text-muted); padding:24px;">No users found.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
