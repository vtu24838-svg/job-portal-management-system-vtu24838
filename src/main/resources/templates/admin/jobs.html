<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Jobs — CareerConnect</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="page-wrapper">

<div th:replace="~{fragments/layout :: dashNavbar}"></div>

<div class="dashboard-layout no-right">

  <div th:replace="~{fragments/layout :: adminSidebar(user=${user}, activePage='jobs')}"></div>

  <main>
    <div class="card mb-3">
      <h1 style="font-size:18px; font-weight:700;">Job Management</h1>
      <p class="text-muted mt-1" th:text="${jobs.size()} + ' job listings on platform'">Count</p>
    </div>

    <div th:if="${successMsg}" class="alert alert-success"><span th:text="${successMsg}"></span></div>

    <div class="card">
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Job Title</th>
              <th>Company</th>
              <th>Employer</th>
              <th>Location</th>
              <th>Type</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="job : ${jobs}">
              <td>
                <div style="font-weight:600; font-size:14px;" th:text="${job.title}">Title</div>
                <div style="font-size:11px; color:var(--text-muted);"
                     th:text="${job.createdAt != null ? #temporals.format(job.createdAt, 'dd MMM yyyy') : ''}">Date</div>
              </td>
              <td th:text="${job.company}">Company</td>
              <td style="font-size:13px;" th:text="${job.employer.name}">Employer</td>
              <td style="font-size:13px;" th:text="${job.location}">Location</td>
              <td>
                <span class="badge badge-secondary" th:text="${job.type}">Type</span>
              </td>
              <td>
                <span class="badge"
                      th:classappend="${job.status.name() == 'OPEN' ? 'badge-success' : 'badge-secondary'}"
                      th:text="${job.status}">Status</span>
              </td>
              <td>
                <form th:action="@{/admin/jobs/delete/{id}(id=${job.id})}" method="post" style="display:inline;">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-danger btn-sm"
                          data-confirm="Are you sure you want to delete this job listing?">Delete</button>
                </form>
              </td>
            </tr>
            <tr th:if="${jobs.empty}">
              <td colspan="7" style="text-align:center; color:var(--text-muted); padding:24px;">No jobs listed yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
