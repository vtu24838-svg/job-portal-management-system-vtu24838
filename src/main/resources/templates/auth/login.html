<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — CareerConnect</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card fade-in">

    <div class="auth-logo">
      <div class="logo-box">CC</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your CareerConnect account</p>
    </div>

    <div th:if="${loginError}" class="alert alert-danger">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span th:text="${loginError}">Invalid credentials</span>
    </div>
    <div th:if="${logoutMsg}" class="alert alert-success">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      <span th:text="${logoutMsg}">Logged out</span>
    </div>
    <div th:if="${successMsg}" class="alert alert-success">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      <span th:text="${successMsg}">Success</span>
    </div>

    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label class="form-label" for="username">Email Address</label>
        <input id="username" name="username" type="email" class="form-control"
               placeholder="you@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" type="password" class="form-control"
               placeholder="Enter your password" required/>
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
        Sign In to CareerConnect
      </button>
    </form>

    <div class="auth-divider"><span>New to CareerConnect?</span></div>

    <a th:href="@{/register}" class="btn btn-outline btn-full">Create an Account</a>
    <div style="text-align:center; margin-top:16px;">
      <a th:href="@{/}" style="font-size:13px; color:var(--text-secondary);">← Back to Home</a>
    </div>
  </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
